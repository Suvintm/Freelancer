# ============================================================
# BASE CONFIG — shared across all profiles
# Profile-specific config in:
#   application-local.yml  → local dev (Docker Kafka)
#   application-cloud.yml  → production (Upstash Kafka)
#
# To run locally:  mvn spring-boot:run -Dspring-boot.run.profiles=local
# On Render:       set SPRING_PROFILES_ACTIVE=cloud
# ============================================================

spring:
  application:
    name: payment-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
