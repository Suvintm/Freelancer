name: SuviX Frontend V2 Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/**'

jobs:
  ci-checks:
    name: Build & Quality (Frontend V2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Security Audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Static Analysis (Lint & Type-Check)
        working-directory: frontend
        run: |
          npm run lint --if-present
          npm run type-check

      - name: Unit Tests (Vitest)
        working-directory: frontend
        run: npm run test

      - name: Production Build
        working-directory: frontend
        run: npm run build

      - name: Bundle Size Audit
        working-directory: frontend
        run: |
          echo "Checking bundle size..."
          du -sh dist/

  e2e-tests:
    name: E2E Testing (Playwright)
    needs: ci-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        working-directory: frontend
        run: npm run test:e2e --if-present

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  deploy:
    name: Deploy to Vercel
    needs: [ci-checks, e2e-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        run: npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --prod --cwd frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
