name: "Admin Server: Production Pipeline"

on:
  push:
    branches: [main, master]
    paths:
      - 'admin-server/**'
      - '.github/workflows/admin-server-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'admin-server/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-quality-gate:
    name: Build & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-server/package-lock.json

      - name: Install Dependencies
        working-directory: admin-server
        run: npm ci

      - name: Prisma Generate
        working-directory: admin-server
        run: npx prisma generate

      - name: Production Build (Type Check)
        working-directory: admin-server
        run: npm run build

      - name: Security Scan
        working-directory: admin-server
        run: npm audit --audit-level=high

  unit-tests:
    name: Unit & Integration Tests
    needs: ci-quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-server/package-lock.json
      
      - name: Install Dependencies
        working-directory: admin-server
        run: npm ci
      
      - name: Prisma Generate
        working-directory: admin-server
        run: npx prisma generate

      - name: Run Vitest
        working-directory: admin-server
        run: npm test --if-present
        env:
          NODE_ENV: test

  deploy:
    name: Production Deployment
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN_SERVER }}
