name: SuviX Android Distribution

on:
  push:
    branches: [main, master, production]
    paths:
      - 'suvix-mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'suvix-mobile/**'

jobs:
  build-android-preview:
    name: Build Android Preview (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: suvix-mobile/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true

      - name: Install Dependencies
        working-directory: suvix-mobile
        run: npm install --legacy-peer-deps

      - name: Build Android Preview
        working-directory: suvix-mobile
        run: npx eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
