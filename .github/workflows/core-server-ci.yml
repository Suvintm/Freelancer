name: "Core Server: Production Pipeline"

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/core-server-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-quality-gate:
    name: Build & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        working-directory: server
        run: npm ci

      - name: Prisma Generate
        working-directory: server
        run: npx prisma generate

      - name: Static Analysis (Lint)
        working-directory: server
        run: npm run lint --if-present

      - name: Security Scan (npm audit)
        working-directory: server
        run: npm audit --audit-level=high

      - name: Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit-tests:
    name: Unit & Integration Tests
    needs: ci-quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      
      - name: Install Dependencies
        working-directory: server
        run: npm ci
      
      - name: Prisma Generate
        working-directory: server
        run: npx prisma generate

      - name: Run Vitest
        working-directory: server
        run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test-secret' }}

  load-test:
    name: Load & Performance Gate
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Load Test
        run: k6 run load-test.js --env BASE_URL=https://suvix-api-staging.onrender.com


  deploy:
    name: Production Deployment
    needs: [unit-tests, load-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}
