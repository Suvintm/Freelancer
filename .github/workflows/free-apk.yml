name: SuviX Zero-Cost APK Build (Free)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build Type (assembleDebug for testing, assembleRelease for production-ready)"
        required: true
        default: "assembleRelease"

jobs:
  build-free-apk:
    name: 🚀 Build Signed APK ($0)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: suvix-mobile/package-lock.json

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 📦 Install Dependencies
        working-directory: suvix-mobile
        run: npm install --legacy-peer-deps

      - name: 🏗️ Expo Prebuild (Generate Native Modules)
        working-directory: suvix-mobile
        run: npx expo prebuild --platform android --no-install

      - name: 🔐 Reconstruct Keystore
        working-directory: suvix-mobile/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" > keystore.b64
          base64 -d keystore.b64 > release.jks
          if [ -s release.jks ]; then
            echo "✅ Keystore reconstructed successfully"
          else
            echo "❌ Keystore file is empty!"
            exit 1
          fi

      - name: 🔨 Build with Gradle
        working-directory: suvix-mobile/android
        run: |
          ./gradlew ${{ github.event.inputs.build_type }} \
            -Pandroid.injected.signing.store.file=$(pwd)/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_REDIRECT_URL: ${{ secrets.EXPO_PUBLIC_GOOGLE_REDIRECT_URL }}

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuviX-Free-Build
          path: |
            suvix-mobile/android/app/build/outputs/apk/release/*.apk
            suvix-mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
