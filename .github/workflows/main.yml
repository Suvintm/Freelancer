name: SuviX Global Production Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────
  # STAGE 1: CI (Continuous Integration - Trust the Code)
  # ─────────────────────────────────────────────────────────────
  ci-checks:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [server, frontend, admin-frontend, admin-server]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install & Lint
        working-directory: ${{ matrix.service }}
        run: |
          npm ci
          npm run lint --if-present

      - name: Run Tests
        working-directory: ${{ matrix.service }}
        run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: github-actions-secret-test
          KYC_ENCRYPTION_KEY: "dummy_value_for_tests_32_characters_long"

      - name: Run E2E Tests (Frontend Only)
        if: matrix.service == 'frontend'
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium
          npx playwright test

  # ─────────────────────────────────────────────────────────────
  # STAGE 2: Security Audit & Secrets Scan
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (Secrets Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # STAGE 3: CD (Continuous Deployment - Ship the Code)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Auto-Deploy to Render
    needs: [ci-checks, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy (Core API)
        if: success()
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}
      
      - name: Deploy Frontend to Vercel
        if: success()
        run: npx vercel deploy ./frontend --token=${{ secrets.VERCEL_TOKEN }} --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Admin Frontend to Vercel
        if: success()
        run: npx vercel deploy ./admin-frontend --token=${{ secrets.VERCEL_TOKEN }} --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

      - name: Trigger Render Deploy (Admin Server)
        if: success()
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN_SERVER }}

