name: SuviX Global Production Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'admin-frontend/**'
      - 'admin-server/**'
      - '.github/workflows/main.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'admin-frontend/**'
      - 'admin-server/**'

jobs:
  # ─────────────────────────────────────────────────────────────
  # STAGE 1: CI (Continuous Integration - Trust the Code)
  # ─────────────────────────────────────────────────────────────
  ci-checks:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [server, admin-frontend, admin-server]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install, Lint & Build
        working-directory: ${{ matrix.service }}
        run: |
          npm ci
          if [ -d "prisma" ]; then npx prisma generate; fi
          npm run lint --if-present
          npm run build --if-present

      - name: Run Tests
        working-directory: ${{ matrix.service }}
        run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: github-actions-secret-test
          KYC_ENCRYPTION_KEY: "dummy_value_for_tests_32_characters_long"


  # ─────────────────────────────────────────────────────────────
  # STAGE 2: Security Audit & Secrets Scan
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (Secrets Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # STAGE 3: CD (Continuous Deployment - Ship the Code)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Auto-Deploy to Render
    needs: [ci-checks, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Trigger Render Deploy (Core API)
        if: success()
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}
      

      - name: Deploy Admin Frontend to Vercel
        if: success()
        run: npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

      - name: Trigger Render Deploy (Admin Server)
        if: success()
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN_SERVER }}

