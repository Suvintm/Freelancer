name: SuviX CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Security & Audit (Node.js)
  # ─────────────────────────────────────────────────────────────
  security-audit:
    name: Security & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      # Only fail on HIGH or CRITICAL in production deps
      # devDependencies audit failures are warnings, not blockers
      - name: Server Dependency Audit
        working-directory: server
        run: |
          npm install
          npm audit --audit-level=high --omit=dev || true
          echo "--- Full audit (dev included, informational only) ---"
          npm audit --audit-level=critical || exit 1

      - name: Frontend Dependency Audit
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=high --omit=dev || true
          npm audit --audit-level=critical || exit 1

      - name: Admin Frontend Dependency Audit
        working-directory: admin-frontend
        run: |
          npm install
          npm audit --audit-level=high --omit=dev || true
          npm audit --audit-level=critical || exit 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Secrets Leak Detection
  # ─────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for gitleaks

      - name: Check for secrets in code
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Lint & Build — Node.js + Frontend
  # ─────────────────────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build Verification
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- SERVER ---
      - name: Install Server Dependencies
        working-directory: server
        run: npm ci

      - name: Server Lint
        working-directory: server
        run: npm run lint || echo "⚠️  Server lint issues found (non-blocking)"
        continue-on-error: true

      # --- FRONTEND ---
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend Lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend Build
        working-directory: frontend
        run: npm run build

      # --- ADMIN-FRONTEND ---
      - name: Install Admin Frontend Dependencies
        working-directory: admin-frontend
        run: npm ci

      - name: Admin Frontend Lint
        working-directory: admin-frontend
        run: npm run lint

      - name: Admin Frontend Build
        working-directory: admin-frontend
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Java Payment Microservice Build
  # ─────────────────────────────────────────────────────────────
  java-build:
    name: Java Payment Service Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build Java Service (skip tests)
        working-directory: payment-service
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Run Java Tests
        working-directory: payment-service
        run: mvn test --no-transfer-progress
        continue-on-error: true
